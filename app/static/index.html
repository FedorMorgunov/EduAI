<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAI</title>
<style>
/* ── Reset & tokens ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0f1117;
  --surface:  #1a1d2e;
  --card:     #23263a;
  --border:   #2e3150;
  --accent:   #6c63ff;
  --accent2:  #00d2ff;
  --green:    #4ade80;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --text:     #e8eaf6;
  --muted:    #6b7280;
  --radius:   14px;
  --sidebar:  240px;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────────────── */
aside {
  width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; padding: 0 0 24px;
}
.logo { padding: 28px 24px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
.logo-text { font-weight: 800; font-size: 1.15rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo-version { font-size: 0.7rem; color: var(--muted); margin-left: auto; -webkit-text-fill-color: var(--muted); }
nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 12px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-radius: 10px; cursor: pointer; font-size: 0.92rem; font-weight: 500;
  color: var(--muted); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: linear-gradient(135deg, rgba(108,99,255,.25), rgba(0,210,255,.1)); color: var(--text); }
.nav-item .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
.sidebar-footer { padding: 0 16px; color: var(--muted); font-size: 0.78rem; text-align: center; }

/* ── Main layout ─────────────────────────────────────────── */
main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
header {
  height: 64px; border-bottom: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; padding: 0 32px; gap: 16px; flex-shrink: 0;
}
header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
.header-badge { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 0.8rem; color: var(--muted); }
.btn {
  padding: 9px 20px; border-radius: 10px; font-size: 0.88rem; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; }
.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
.btn-danger:hover { background: rgba(248,113,113,.25); }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; }
.page { flex: 1; overflow-y: auto; padding: 32px; }

/* ── Dashboard ───────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
.stat-card .num { font-size: 2.2rem; font-weight: 800; color: var(--accent2); line-height: 1; }
.stat-card .lbl { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }
.stat-card.green .num { color: var(--green); }
.stat-card.purple .num { color: var(--accent); }
.section-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-title .muted { color: var(--muted); font-size: 0.8rem; font-weight: 400; }
.recent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .recent-grid { grid-template-columns: 1fr; } }

/* ── Cards ───────────────────────────────────────────────── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px; display: flex; flex-direction: column; gap: 12px;
  transition: border-color 0.2s, transform 0.15s;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card-header { display: flex; align-items: flex-start; gap: 10px; }
.card-icon { font-size: 1.4rem; flex-shrink: 0; }
.card-title { font-size: 0.97rem; font-weight: 700; line-height: 1.3; }
.card-body { color: var(--muted); font-size: 0.83rem; line-height: 1.65; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.badge-topic { background: rgba(108,99,255,.18); color: #a89cff; }
.badge-diff { background: rgba(0,210,255,.12); color: var(--accent2); }
.badge-q { background: rgba(74,222,128,.12); color: var(--green); }

/* Difficulty stars */
.stars { color: var(--yellow); font-size: 0.8rem; letter-spacing: 1px; }

/* ── Page header row ─────────────────────────────────────── */
.page-header { display: flex; align-items: center; margin-bottom: 24px; gap: 16px; }
.page-header h2 { font-size: 1.3rem; font-weight: 800; flex: 1; }
.filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.chip {
  padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
  border: 1px solid var(--border); background: var(--card); color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* ── Empty state ─────────────────────────────────────────── */
.empty { text-align: center; padding: 64px 32px; color: var(--muted); }
.empty .empty-icon { font-size: 3rem; margin-bottom: 16px; }
.empty p { font-size: 0.95rem; }

/* ── Modal ───────────────────────────────────────────────── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 32px; width: min(500px, 90vw); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 24px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.form-group label { font-size: 0.82rem; font-weight: 600; color: var(--muted); }
.form-group input, .form-group textarea, .form-group select {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); padding: 10px 14px; font-size: 0.9rem; font-family: inherit;
  outline: none; transition: border-color 0.15s; resize: vertical;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
.close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }

/* ── Quiz player ─────────────────────────────────────────── */
.quiz-player { max-width: 660px; margin: 0 auto; }
.quiz-player .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; margin-bottom: 24px; padding: 0; }
.quiz-player .back-btn:hover { color: var(--text); }
.progress-bar { height: 6px; background: var(--card); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s ease; }
.q-counter { color: var(--muted); font-size: 0.82rem; text-align: right; margin-bottom: 28px; }
.q-text { font-size: 1.2rem; font-weight: 700; line-height: 1.5; margin-bottom: 28px; }
.options { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  background: var(--card); border: 2px solid var(--border); border-radius: 12px;
  padding: 16px 20px; text-align: left; color: var(--text); font-size: 0.95rem;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 14px;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); }
.option-btn .opt-label { background: var(--border); border-radius: 6px; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }
.option-btn.correct { border-color: var(--green); background: rgba(74,222,128,.08); }
.option-btn.correct .opt-label { background: var(--green); color: #000; }
.option-btn.wrong { border-color: var(--red); background: rgba(248,113,113,.08); }
.option-btn.wrong .opt-label { background: var(--red); color: #fff; }
.option-btn.reveal-correct { border-color: var(--green); background: rgba(74,222,128,.05); }
.q-feedback { margin-top: 20px; padding: 14px 18px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; display: none; }
.q-feedback.show { display: block; }
.q-feedback.ok { background: rgba(74,222,128,.12); color: var(--green); }
.q-feedback.fail { background: rgba(248,113,113,.12); color: var(--red); }
.q-next { margin-top: 24px; width: 100%; padding: 14px; font-size: 1rem; display: none; }
.q-next.show { display: flex; justify-content: center; }

/* Score screen */
.score-screen { text-align: center; padding: 40px 24px; }
.score-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; border: 4px solid var(--accent2); }
.score-circle.great { border-color: var(--green); color: var(--green); }
.score-circle.ok { border-color: var(--yellow); color: var(--yellow); }
.score-circle.bad { border-color: var(--red); color: var(--red); }
.score-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
.score-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; }
.review-list { text-align: left; display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.review-item { background: var(--card); border-radius: 10px; padding: 14px 18px; border-left: 3px solid; }
.review-item.ok { border-color: var(--green); }
.review-item.fail { border-color: var(--red); }
.review-item .ri-q { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
.review-item .ri-a { font-size: 0.8rem; color: var(--muted); }
.score-actions { display: flex; gap: 12px; justify-content: center; }

/* ── Lesson reader ───────────────────────────────────────── */
.lesson-reader { max-width: 660px; margin: 0 auto; }
.lesson-reader .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; margin-bottom: 24px; padding: 0; }
.lesson-reader .back-btn:hover { color: var(--text); }
.lesson-content { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; line-height: 1.8; font-size: 0.95rem; color: var(--text); }
.lesson-content p { margin-bottom: 12px; }

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Toast ───────────────────────────────────────────────── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
.toast { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 0.88rem; animation: slideIn .25s ease; }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── Loading ─────────────────────────────────────────────── */
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 64px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────── -->
<aside>
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <span class="logo-text">EduAI</span>
    <span class="logo-version">v0.1.0</span>
  </div>
  <nav>
    <div class="nav-label">Menu</div>
    <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">🏠</span> Dashboard
    </button>
    <button class="nav-item" data-page="lessons" onclick="navigate('lessons')">
      <span class="nav-icon">📖</span> Lessons
      <span class="nav-badge" id="badge-lessons">0</span>
    </button>
    <button class="nav-item" data-page="quizzes" onclick="navigate('quizzes')">
      <span class="nav-icon">🧠</span> Quizzes
      <span class="nav-badge" id="badge-quizzes">0</span>
    </button>
    <div class="nav-label" style="margin-top:8px">Dev</div>
    <button class="nav-item" onclick="window.open('/docs','_blank')">
      <span class="nav-icon">⚡</span> API Docs
    </button>
  </nav>
  <div class="sidebar-footer">EduAI Platform &copy; 2026</div>
</aside>

<!-- ── Main ────────────────────────────────────────────── -->
<main>
  <header>
    <h1 id="page-title">Dashboard</h1>
    <span class="header-badge" id="header-badge">Overview</span>
    <button class="btn btn-primary" id="header-action" style="display:none" onclick="openCreateModal()">
      + New
    </button>
  </header>
  <div class="page" id="page-content">
    <div class="spinner"></div>
  </div>
</main>

<!-- ── Create Lesson Modal ─────────────────────────────── -->
<div class="overlay" id="lesson-modal">
  <div class="modal" style="position:relative">
    <button class="close-btn" onclick="closeModal('lesson-modal')">✕</button>
    <h2>Create Lesson</h2>
    <div class="form-group">
      <label>Title</label>
      <input id="lf-title" placeholder="e.g. Introduction to Python" maxlength="200">
    </div>
    <div class="form-group">
      <label>Topic</label>
      <input id="lf-topic" placeholder="e.g. Python" maxlength="100">
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="lf-content" rows="5" placeholder="Lesson content…"></textarea>
    </div>
    <div class="form-group">
      <label>Difficulty (1–5)</label>
      <select id="lf-diff">
        <option value="1">1 — Beginner</option>
        <option value="2">2 — Easy</option>
        <option value="3">3 — Intermediate</option>
        <option value="4">4 — Hard</option>
        <option value="5">5 — Expert</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('lesson-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitLesson()">Create Lesson</button>
    </div>
  </div>
</div>

<!-- ── Create Quiz Modal ───────────────────────────────── -->
<div class="overlay" id="quiz-modal">
  <div class="modal" style="position:relative; max-width:560px; width:90vw;">
    <button class="close-btn" onclick="closeModal('quiz-modal')">✕</button>
    <h2>Create Quiz</h2>
    <div class="form-group">
      <label>Title</label>
      <input id="qf-title" placeholder="e.g. Python Basics Quiz" maxlength="200">
    </div>
    <div class="form-group">
      <label>Topic</label>
      <input id="qf-topic" placeholder="e.g. Python" maxlength="100">
    </div>
    <div class="form-group">
      <label>Difficulty (1–5)</label>
      <select id="qf-diff">
        <option value="1">1 — Beginner</option>
        <option value="2">2 — Easy</option>
        <option value="3">3 — Intermediate</option>
        <option value="4">4 — Hard</option>
        <option value="5">5 — Expert</option>
      </select>
    </div>
    <div id="qf-questions"></div>
    <button class="btn btn-secondary btn-sm" onclick="addQuestionField()" style="margin-bottom:16px">+ Add Question</button>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('quiz-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitQuiz()">Create Quiz</button>
    </div>
  </div>
</div>

<!-- ── Toasts ──────────────────────────────────────────── -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
/* ── State ─────────────────────────────────────────────── */
let currentPage = 'dashboard';
let allLessons = [];
let allQuizzes = [];
let currentFilter = 'All';

/* ── API ────────────────────────────────────────────────── */
const api = {
  get:    (url)        => fetch(url).then(r => r.json()),
  post:   (url, data)  => fetch(url, { method: 'POST',   headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).then(r => r.ok ? r.json() : r.json().then(e => { throw e; })),
  patch:  (url, data)  => fetch(url, { method: 'PATCH',  headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).then(r => r.ok ? r.json() : r.json().then(e => { throw e; })),
  delete: (url)        => fetch(url, { method: 'DELETE' }).then(r => ({ ok: r.ok, status: r.status })),
};

/* ── Toast ──────────────────────────────────────────────── */
function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ── Navigation ─────────────────────────────────────────── */
function navigate(page) {
  currentPage = page;
  currentFilter = 'All';
  document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const titles = { dashboard: 'Dashboard', lessons: 'Lessons', quizzes: 'Quizzes' };
  const badges = { dashboard: 'Overview', lessons: 'All topics', quizzes: 'All topics' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('header-badge').textContent = badges[page] || '';
  const btn = document.getElementById('header-action');
  btn.style.display = (page === 'lessons' || page === 'quizzes') ? 'inline-flex' : 'none';
  btn.textContent = page === 'lessons' ? '+ New Lesson' : '+ New Quiz';
  if (page === 'dashboard') renderDashboard();
  else if (page === 'lessons') renderLessons();
  else if (page === 'quizzes') renderQuizzes();
}

function openCreateModal() {
  if (currentPage === 'lessons') openModal('lesson-modal');
  else openModal('quiz-modal');
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ── Dashboard ───────────────────────────────────────────── */
async function renderDashboard() {
  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="spinner"></div>';
  const [lessons, quizzes] = await Promise.all([
    api.get('/lessons/'), api.get('/quizzes/')
  ]);
  allLessons = lessons; allQuizzes = quizzes;
  updateBadges();

  const topics = [...new Set([...lessons.map(l => l.topic), ...quizzes.map(q => q.topic)])];

  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${lessons.length}</div><div class="lbl">Lessons available</div></div>
      <div class="stat-card purple"><div class="num">${quizzes.length}</div><div class="lbl">Quizzes available</div></div>
      <div class="stat-card green"><div class="num">${topics.length}</div><div class="lbl">Topics covered</div></div>
      <div class="stat-card"><div class="num">${quizzes.reduce((s,q)=>s+q.questions.length,0)}</div><div class="lbl">Total questions</div></div>
    </div>
    <div class="recent-grid">
      <div>
        <div class="section-title">📖 Recent Lessons <span class="muted">Last ${Math.min(lessons.length,3)}</span></div>
        ${lessons.slice(-3).reverse().map(l => lessonCard(l, true)).join('') || emptyState('No lessons yet')}
      </div>
      <div>
        <div class="section-title">🧠 Recent Quizzes <span class="muted">Last ${Math.min(quizzes.length,3)}</span></div>
        ${quizzes.slice(-3).reverse().map(q => quizCard(q, true)).join('') || emptyState('No quizzes yet')}
      </div>
    </div>
  `;
}

function updateBadges() {
  document.getElementById('badge-lessons').textContent = allLessons.length;
  document.getElementById('badge-quizzes').textContent = allQuizzes.length;
}

/* ── Lessons ─────────────────────────────────────────────── */
async function renderLessons(filter) {
  const content = document.getElementById('page-content');
  if (!allLessons.length) {
    content.innerHTML = '<div class="spinner"></div>';
    allLessons = await api.get('/lessons/');
  }
  updateBadges();

  const topics = ['All', ...[...new Set(allLessons.map(l => l.topic))].sort()];
  if (filter !== undefined) currentFilter = filter;
  const shown = currentFilter === 'All' ? allLessons : allLessons.filter(l => l.topic === currentFilter);

  content.innerHTML = `
    <div class="page-header">
      <h2>All Lessons</h2>
      <div class="filter-row">
        ${topics.map(t => `<button class="chip ${t===currentFilter?'active':''}" onclick="renderLessons('${t}')">${t}</button>`).join('')}
      </div>
    </div>
    ${shown.length
      ? `<div class="cards-grid">${shown.map(l => lessonCard(l)).join('')}</div>`
      : emptyState('No lessons in this topic yet.')}
  `;
}

function lessonCard(l, compact = false) {
  return `
    <div class="card" id="lesson-${l.id}">
      <div class="card-header">
        <span class="card-icon">📖</span>
        <span class="card-title">${esc(l.title)}</span>
      </div>
      <div class="card-body">${esc(l.content)}</div>
      <div class="card-footer">
        <span class="badge badge-topic">${esc(l.topic)}</span>
        <span class="stars">${'★'.repeat(l.difficulty)}${'☆'.repeat(5-l.difficulty)}</span>
        ${compact ? '' : `
          <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="viewLesson(${l.id})">Read</button>
          <button class="btn btn-danger btn-sm" onclick="deleteLesson(${l.id})">✕</button>
        `}
      </div>
    </div>`;
}

async function viewLesson(id) {
  const l = allLessons.find(x => x.id === id);
  if (!l) return;
  const content = document.getElementById('page-content');
  document.getElementById('page-title').textContent = l.title;
  document.getElementById('header-badge').textContent = l.topic;
  document.getElementById('header-action').style.display = 'none';
  content.innerHTML = `
    <div class="lesson-reader">
      <button class="back-btn" onclick="navigate('lessons')">← Back to Lessons</button>
      <div class="card-footer" style="margin-bottom:18px; gap:10px">
        <span class="badge badge-topic">${esc(l.topic)}</span>
        <span class="badge badge-diff">Difficulty ${l.difficulty}/5</span>
        <span class="stars">${'★'.repeat(l.difficulty)}${'☆'.repeat(5-l.difficulty)}</span>
      </div>
      <div class="lesson-content"><p>${esc(l.content)}</p></div>
    </div>`;
}

async function deleteLesson(id) {
  const res = await api.delete(`/lessons/${id}`);
  if (res.ok || res.status === 204) {
    allLessons = allLessons.filter(l => l.id !== id);
    toast('Lesson deleted');
    renderLessons();
  } else {
    toast('Failed to delete lesson', 'err');
  }
}

async function submitLesson() {
  const title   = document.getElementById('lf-title').value.trim();
  const topic   = document.getElementById('lf-topic').value.trim();
  const content = document.getElementById('lf-content').value.trim();
  const diff    = parseInt(document.getElementById('lf-diff').value);
  if (!title || !topic || !content) { toast('Please fill in all fields', 'err'); return; }
  try {
    const lesson = await api.post('/lessons/', { title, topic, content, difficulty: diff });
    allLessons.push(lesson);
    closeModal('lesson-modal');
    ['lf-title','lf-topic','lf-content'].forEach(id => document.getElementById(id).value = '');
    toast('Lesson created ✓');
    renderLessons();
  } catch (e) {
    toast('Error creating lesson', 'err');
  }
}

/* ── Quizzes ─────────────────────────────────────────────── */
async function renderQuizzes(filter) {
  const content = document.getElementById('page-content');
  if (!allQuizzes.length) {
    content.innerHTML = '<div class="spinner"></div>';
    allQuizzes = await api.get('/quizzes/');
  }
  updateBadges();

  const topics = ['All', ...[...new Set(allQuizzes.map(q => q.topic))].sort()];
  if (filter !== undefined) currentFilter = filter;
  const shown = currentFilter === 'All' ? allQuizzes : allQuizzes.filter(q => q.topic === currentFilter);

  content.innerHTML = `
    <div class="page-header">
      <h2>All Quizzes</h2>
      <div class="filter-row">
        ${topics.map(t => `<button class="chip ${t===currentFilter?'active':''}" onclick="renderQuizzes('${t}')">${t}</button>`).join('')}
      </div>
    </div>
    ${shown.length
      ? `<div class="cards-grid">${shown.map(q => quizCard(q)).join('')}</div>`
      : emptyState('No quizzes in this topic yet.')}
  `;
}

function quizCard(q, compact = false) {
  return `
    <div class="card" id="quiz-${q.id}" style="cursor:${compact?'default':'pointer'}" ${compact?'':` onclick="startQuiz(${q.id})"`}>
      <div class="card-header">
        <span class="card-icon">🧠</span>
        <span class="card-title">${esc(q.title)}</span>
      </div>
      <div class="card-footer">
        <span class="badge badge-topic">${esc(q.topic)}</span>
        <span class="badge badge-q">${q.questions.length} Qs</span>
        <span class="stars" style="margin-left:auto">${'★'.repeat(q.difficulty)}${'☆'.repeat(5-q.difficulty)}</span>
        ${compact ? '' : `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteQuiz(${q.id})">✕</button>`}
      </div>
      ${compact ? '' : `<div style="font-size:0.8rem;color:var(--muted);margin-top:-4px">Click to start →</div>`}
    </div>`;
}

async function deleteQuiz(id) {
  const res = await api.delete(`/quizzes/${id}`);
  if (res.ok || res.status === 204) {
    allQuizzes = allQuizzes.filter(q => q.id !== id);
    toast('Quiz deleted');
    renderQuizzes();
  } else {
    toast('Failed to delete quiz', 'err');
  }
}

/* ── Quiz Player ─────────────────────────────────────────── */
let qState = {};

function startQuiz(id) {
  const quiz = allQuizzes.find(q => q.id === id);
  if (!quiz) return;
  qState = { quiz, idx: 0, score: 0, results: [], answered: false };
  document.getElementById('page-title').textContent = quiz.title;
  document.getElementById('header-badge').textContent = quiz.topic;
  document.getElementById('header-action').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const { quiz, idx } = qState;
  const q = quiz.questions[idx];
  const pct = (idx / quiz.questions.length) * 100;
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="quiz-player">
      <button class="back-btn" onclick="navigate('quizzes')">← Back to Quizzes</button>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="q-counter">Question ${idx + 1} of ${quiz.questions.length}</div>
      <div class="q-text">${esc(q.question)}</div>
      <div class="options" id="options">
        ${q.options.map(o => `
          <button class="option-btn" id="opt-${o.label}" onclick="selectAnswer('${o.label}','${q.correct_label}')">
            <span class="opt-label">${o.label}</span>
            <span>${esc(o.text)}</span>
          </button>`).join('')}
      </div>
      <div class="q-feedback" id="q-feedback"></div>
      <button class="btn btn-primary q-next" id="q-next" onclick="nextQuestion()">
        ${idx + 1 < quiz.questions.length ? 'Next Question →' : 'See Results'}
      </button>
    </div>`;
}

function selectAnswer(chosen, correct) {
  if (qState.answered) return;
  qState.answered = true;
  const correct_answer = correct;
  const isCorrect = chosen === correct_answer;
  if (isCorrect) qState.score++;

  const { quiz, idx } = qState;
  const q = quiz.questions[idx];
  qState.results.push({ question: q.question, chosen, correct: correct_answer, ok: isCorrect,
    chosenText: q.options.find(o=>o.label===chosen)?.text,
    correctText: q.options.find(o=>o.label===correct_answer)?.text });

  // Style options
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const lbl = btn.id.replace('opt-', '');
    if (lbl === chosen && isCorrect) btn.classList.add('correct');
    else if (lbl === chosen && !isCorrect) btn.classList.add('wrong');
    else if (lbl === correct_answer) btn.classList.add('reveal-correct');
  });

  const fb = document.getElementById('q-feedback');
  fb.className = `q-feedback show ${isCorrect ? 'ok' : 'fail'}`;
  fb.textContent = isCorrect ? '✓ Correct!' : `✗ Correct answer: ${correct_answer} — ${qState.results.at(-1).correctText}`;

  document.getElementById('q-next').classList.add('show');
}

function nextQuestion() {
  qState.idx++;
  qState.answered = false;
  if (qState.idx < qState.quiz.questions.length) {
    renderQuestion();
  } else {
    renderScore();
  }
}

function renderScore() {
  const { score, quiz, results } = qState;
  const total = quiz.questions.length;
  const pct = Math.round((score / total) * 100);
  const cls = pct >= 80 ? 'great' : pct >= 50 ? 'ok' : 'bad';
  const msg = pct >= 80 ? '🎉 Excellent work!' : pct >= 50 ? '👍 Good effort!' : '📚 Keep studying!';

  document.getElementById('page-content').innerHTML = `
    <div class="quiz-player">
      <div class="score-screen">
        <div class="score-circle ${cls}">${score}/${total}<span style="font-size:0.9rem;font-weight:400">${pct}%</span></div>
        <div class="score-title">${msg}</div>
        <div class="score-sub">You got <strong>${score}</strong> out of <strong>${total}</strong> questions correct.</div>
        <div class="review-list">
          ${results.map((r,i) => `
            <div class="review-item ${r.ok?'ok':'fail'}">
              <div class="ri-q">${i+1}. ${esc(r.question)}</div>
              <div class="ri-a">${r.ok ? `✓ ${esc(r.chosenText)}` : `✗ You: ${esc(r.chosenText)} · Correct: ${esc(r.correctText)}`}</div>
            </div>`).join('')}
        </div>
        <div class="score-actions">
          <button class="btn btn-secondary" onclick="startQuiz(${quiz.id})">Retry Quiz</button>
          <button class="btn btn-primary" onclick="navigate('quizzes')">Back to Quizzes</button>
        </div>
      </div>
    </div>`;
}

/* ── Quiz Create Modal ───────────────────────────────────── */
let questionCount = 0;
function addQuestionField() {
  questionCount++;
  const n = questionCount;
  const wrap = document.getElementById('qf-questions');
  const div = document.createElement('div');
  div.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px';
  div.innerHTML = `
    <div style="font-size:0.82rem;font-weight:700;color:var(--muted);margin-bottom:10px">Question ${n}</div>
    <div class="form-group"><label>Question text</label><input id="qq-${n}-text" placeholder="What is…?"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Option A</label><input id="qq-${n}-A" placeholder="Option A"></div>
      <div class="form-group"><label>Option B</label><input id="qq-${n}-B" placeholder="Option B"></div>
      <div class="form-group"><label>Option C</label><input id="qq-${n}-C" placeholder="Option C"></div>
      <div class="form-group"><label>Option D</label><input id="qq-${n}-D" placeholder="Option D"></div>
    </div>
    <div class="form-group"><label>Correct answer</label>
      <select id="qq-${n}-correct">
        <option value="A">A</option><option value="B">B</option>
        <option value="C">C</option><option value="D">D</option>
      </select>
    </div>`;
  wrap.appendChild(div);
}

async function submitQuiz() {
  const title = document.getElementById('qf-title').value.trim();
  const topic = document.getElementById('qf-topic').value.trim();
  const diff  = parseInt(document.getElementById('qf-diff').value);
  if (!title || !topic) { toast('Fill in title and topic', 'err'); return; }
  if (questionCount === 0) { toast('Add at least one question', 'err'); return; }

  const questions = [];
  for (let i = 1; i <= questionCount; i++) {
    const text = document.getElementById(`qq-${i}-text`)?.value.trim();
    if (!text) continue;
    const options = ['A','B','C','D'].map(l => ({ label: l, text: document.getElementById(`qq-${i}-${l}`)?.value.trim() || '' })).filter(o => o.text);
    const correct_label = document.getElementById(`qq-${i}-correct`)?.value;
    questions.push({ question: text, options, correct_label });
  }
  if (!questions.length) { toast('Add at least one question with text', 'err'); return; }

  try {
    const quiz = await api.post('/quizzes/', { title, topic, difficulty: diff, questions });
    allQuizzes.push(quiz);
    closeModal('quiz-modal');
    document.getElementById('qf-title').value = '';
    document.getElementById('qf-topic').value = '';
    document.getElementById('qf-questions').innerHTML = '';
    questionCount = 0;
    toast('Quiz created ✓');
    renderQuizzes();
  } catch (e) {
    toast('Error creating quiz', 'err');
  }
}

/* ── Helpers ─────────────────────────────────────────────── */
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function emptyState(msg) {
  return `<div class="empty"><div class="empty-icon">🗂️</div><p>${msg}</p></div>`;
}

/* ── Init ────────────────────────────────────────────────── */
navigate('dashboard');
</script>
</body>
</html>
